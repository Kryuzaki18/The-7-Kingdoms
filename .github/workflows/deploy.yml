name: The 7 Kingdoms
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        working-directory: ./ui-the-7-kingdoms
        run: npm install

      - name: Build
        working-directory: ./ui-the-7-kingdoms
        run: npx ng build --base-href "/"

      - name: Copy index.html to 404.html
        run: cp ./ui-the-7-kingdoms/dist/ui-the-7-kingdoms/browser/index.html ./ui-the-7-kingdoms/dist/ui-the-7-kingdoms/browser/404.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ui-the-7-kingdoms/dist/ui-the-7-kingdoms/browser
          cname: the7kingdoms.org