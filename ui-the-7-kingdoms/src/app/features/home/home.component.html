<div
  class="flex flex-col h-screen bg-cover bg-center bg-no-repeat bg-fixed"
  style="background-image: url('bg2.png')"
>
  <div class="relative flex flex-col h-full bg-stone-50/85 dark:bg-[#0e0b00]/90 overflow-hidden">
    @if (themeService.isDark()) {
      <div class="absolute inset-0 z-0 overflow-hidden" aria-hidden="true">
        @for (star of stars; track $index) {
          <span
            class="star-particle"
            [style.left]="star.left"
            [style.top]="star.top"
            [style.width]="star.size"
            [style.height]="star.size"
            [style.--star-op]="star.opacity"
            [style.animation-delay]="star.delay"
            [style.animation-duration]="star.duration"
          ></span>
        }
      </div>
    } @else {
      <div class="absolute inset-0 z-0 overflow-hidden" aria-hidden="true">
        @for (drop of rainDrops; track $index) {
          <span
            class="rain-drop"
            [style.left]="drop.left"
            [style.height]="drop.height"
            [style.--rain-op]="drop.opacity"
            [style.animation-delay]="drop.delay"
            [style.animation-duration]="drop.duration"
          ></span>
        }
      </div>
    }

    <app-header class="relative z-40"></app-header>
    <div id="main-scroll" class="relative z-10 flex-1 overflow-y-auto">
      <div class="max-w-[1200px] m-auto p-4">
        <router-outlet />
      </div>
    </div>
  </div>
</div>
