<div class="flex items-center justify-between gap-4 flex-wrap">
  <div class="flex items-center gap-2">
    <span class="text-xs text-stone-700 dark:text-stone-500 select-none">Per page</span>
    <div
      class="flex items-center rounded-lg border border-stone-400/30 dark:border-yellow-900/40 overflow-hidden"
    >
      @for (size of pageSizeOptions; track size) {
        <button
          type="button"
          (click)="selectSize(size)"
          [disabled]="isLoading"
          class="px-3 py-1.5 text-xs font-medium transition-colors cursor-pointer disabled:cursor-not-allowed"
          [class]="
            pageSize === size
              ? 'bg-white dark:bg-yellow-600 text-stone-800 dark:text-stone-950'
              : 'text-stone-500 dark:text-stone-400 hover:bg-stone-50 dark:hover:bg-yellow-900/20 hover:text-stone-700 dark:hover:text-stone-200 disabled:hover:bg-transparent disabled:hover:text-stone-500'
          "
        >
          {{ size }}
        </button>
      }
    </div>
  </div>

  <div class="flex items-center gap-1">
    <button
      type="button"
      (click)="prevSkip()"
      [disabled]="isPrevDisabled"
      title="-{{ skipAmount }} pages"
      class="cursor-pointer inline-flex items-center px-2.5 h-8 rounded-lg text-sm font-medium transition-colors dark:border dark:border-yellow-900/40 text-stone-400 dark:text-stone-500 hover:border-yellow-500/60 dark:hover:border-yellow-600/60 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:border-stone-200 dark:disabled:hover:border-yellow-900/40 disabled:hover:text-stone-400 disabled:hover:bg-transparent"
    >
      <img src="svgs/double-chevron-left.svg" alt="" class="w-5 h-5 shrink-0 dark:invert" aria-hidden="true" />
    </button>

    <button
      type="button"
      (click)="prev()"
      [disabled]="isPrevDisabled"
      class="cursor-pointer inline-flex items-center gap-1.5 px-3 h-8 rounded-lg text-sm font-medium transition-colors dark:border dark:border-yellow-900/40 text-stone-600 dark:text-stone-300 hover:border-yellow-500/60 dark:hover:border-yellow-600/60 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:border-stone-200 dark:disabled:hover:border-yellow-900/40 disabled:hover:text-stone-600 dark:disabled:hover:text-stone-300 disabled:hover:bg-transparent"
    >
      <img src="svgs/chevron-left.svg" alt="" class="w-4 h-4 shrink-0 dark:invert" aria-hidden="true" />
      <span>Prev</span>
    </button>

    <span
      class="flex items-center justify-center min-w-[2.25rem] h-8 px-2.5 rounded-lg text-sm font-semibold bg-white/50 dark:bg-yellow-900/20 border border-stone-700/30 dark:border-yellow-800/40 text-yellow-800 dark:text-yellow-400"
    >
      @if (isLoading) {
        <span class="w-3 h-3 rounded-full border-2 border-yellow-300 dark:border-yellow-700 border-t-yellow-600 dark:border-t-yellow-400 animate-spin"></span>
      } @else {
        {{ page }}
      }
    </span>

    <button
      type="button"
      (click)="next()"
      [disabled]="isNextDisabled"
      class="cursor-pointer inline-flex items-center gap-1.5 px-3 h-8 rounded-lg text-sm font-medium transition-colors dark:border dark:border-yellow-900/40 text-stone-600 dark:text-stone-300 hover:border-yellow-500/60 dark:hover:border-yellow-600/60 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:border-stone-200 dark:disabled:hover:border-yellow-900/40 disabled:hover:text-stone-600 dark:disabled:hover:text-stone-300 disabled:hover:bg-transparent"
    >
      <span>Next</span>
      <img src="svgs/chevron-right.svg" alt="" class="w-5 h-5 shrink-0 dark:invert" aria-hidden="true" />
    </button>

    <button
      type="button"
      (click)="nextSkip()"
      [disabled]="isNextDisabled"
      title="+{{ skipAmount }} pages"
      class="cursor-pointer inline-flex items-center px-2.5 h-8 rounded-lg text-sm font-medium transition-colors dark:border dark:border-yellow-900/40 text-stone-400 dark:text-stone-500 hover:border-yellow-500/60 dark:hover:border-yellow-600/60 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:border-stone-200 dark:disabled:hover:border-yellow-900/40 disabled:hover:text-stone-400 disabled:hover:bg-transparent"
    >
      <img src="svgs/double-chevron-right.svg" alt="" class="w-5 h-5 shrink-0 dark:invert" aria-hidden="true" />
    </button>
  </div>
</div>
