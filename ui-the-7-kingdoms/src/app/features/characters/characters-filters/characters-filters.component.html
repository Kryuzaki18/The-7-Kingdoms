<div class="flex flex-wrap items-center gap-2">
  <div
    class="flex items-center gap-3 px-3 flex-1 min-w-[180px] rounded-lg border border-stone-200 dark:border-yellow-900/40 bg-white dark:bg-black/20 transition-colors"
  >
    <img src="/svgs/search.svg" alt="" class="w-4 h-4 shrink-0 dark:invert" aria-hidden="true" />
    <input
      type="text"
      [value]="nameValue()"
      (input)="onNameInput($event)"
      placeholder="Search... (e.g., Jon Snow)"
      class="w-full py-2 text-sm text-stone-900 dark:text-stone-100 placeholder-stone-400 dark:placeholder-stone-600 outline-none bg-transparent"
    />
    @if (nameValue()) {
      <button type="button" class="outline-none cursor-pointer" (click)="clearFilters()" aria-label="Clear filters">
        <img src="/svgs/close.svg" alt="" class="w-4 h-4 shrink-0 dark:invert" aria-hidden="true" />
      </button>
    }
  </div>

  <div class="relative w-full md:w-auto" (click)="$event.stopPropagation()">
    <button
      type="button"
      (click)="toggleDropdown($event)"
      class="w-full md:w-40 flex items-center justify-between gap-2 pl-3.5 pr-2.5 py-2 rounded-lg text-sm border cursor-pointer select-none transition-all duration-150"
      [class]="isDropdownOpen()
        ? 'border-yellow-500 dark:border-yellow-600 bg-yellow-50 dark:bg-yellow-900/20 text-yellow-700 dark:text-yellow-300'
        : 'border-stone-200 dark:border-yellow-900/40 bg-white dark:bg-black/20 text-stone-700 dark:text-stone-300 hover:border-yellow-400/60 dark:hover:border-yellow-700/60'"
    >
      <span class="font-medium">{{ selectedGenderLabel }}</span>
      <img
        src="/svgs/chevron-left.svg"
        alt=""
        class="w-4 h-4 -rotate-90 shrink-0 dark:invert duration-200 transition-transform"
        aria-hidden="true"
        [class.rotate-90]="isDropdownOpen()"
      />
    </button>

    @if (isDropdownOpen()) {
      <div
        class="absolute top-[calc(100%+6px)] left-0 min-w-full rounded-xl border border-stone-200 dark:border-yellow-900/40 bg-white dark:bg-[#1a1400] shadow-lg shadow-stone-200/60 dark:shadow-black/60 z-20 overflow-hidden py-1"
      >
        @for (opt of genderOptions; track opt.value) {
          <button
            type="button"
            (click)="selectGender(opt.value, $event)"
            class="w-full flex items-center justify-between gap-3 px-3.5 py-2 text-sm text-left transition-colors cursor-pointer"
            [class]="genderValue() === opt.value
              ? 'bg-yellow-50 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400 font-medium'
              : 'text-stone-700 dark:text-stone-300 hover:bg-stone-50 dark:hover:bg-yellow-900/20'"
          >
            <span>{{ opt.label }}</span>
            @if (genderValue() === opt.value) {
              <img src="/svgs/check.svg" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
            }
          </button>
        }
      </div>
    }
  </div>
</div>
