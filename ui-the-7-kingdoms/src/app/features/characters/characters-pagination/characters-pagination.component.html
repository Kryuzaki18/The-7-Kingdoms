<div class="flex items-center justify-center gap-3">
  <button
    type="button"
    (click)="prev()"
    [disabled]="isPrevDisabled"
    class="cursor-pointer inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-medium border transition-colors border-stone-200 dark:border-yellow-900/40 text-stone-600 dark:text-stone-300 hover:border-yellow-500/60 dark:hover:border-yellow-600/60 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:border-stone-200 dark:disabled:hover:border-yellow-900/40 disabled:hover:text-stone-600 dark:disabled:hover:text-stone-300 disabled:hover:bg-transparent"
  >
    <img
      src="/svgs/chevron-left.svg"
      alt=""
      class="w-4 h-4 shrink-0 dark:invert"
      aria-hidden="true"
    />
    <span>Previous</span>
  </button>

  <span
    class="flex items-center justify-center min-w-[2.5rem] h-9 px-3 rounded-lg text-sm font-semibold bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800/40 text-yellow-700 dark:text-yellow-400"
  >
    @if (isLoading) {
      <span
        class="w-3.5 h-3.5 rounded-full border-2 border-yellow-300 dark:border-yellow-700 border-t-yellow-600 dark:border-t-yellow-400 animate-spin"
      ></span>
    } @else {
      {{ page }}
    }
  </span>

  <button
    type="button"
    (click)="next()"
    [disabled]="isNextDisabled"
    class="cursor-pointer inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-medium border transition-colors border-stone-200 dark:border-yellow-900/40 text-stone-600 dark:text-stone-300 hover:border-yellow-500/60 dark:hover:border-yellow-600/60 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:border-stone-200 dark:disabled:hover:border-yellow-900/40 disabled:hover:text-stone-600 dark:disabled:hover:text-stone-300 disabled:hover:bg-transparent"
  >
    <span>Next</span>
    <img
      src="/svgs/chevron-right.svg"
      alt=""
      class="w-4 h-4 shrink-0 dark:invert"
      aria-hidden="true"
    />
  </button>
</div>
