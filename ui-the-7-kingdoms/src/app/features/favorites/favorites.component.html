<div class="flex items-end justify-between mb-6">
  <div>
    <p class="text-xs font-medium uppercase tracking-widest text-yellow-600 dark:text-yellow-500 mb-1">
      Collection
    </p>
    <h1 class="text-2xl font-cinzel font-bold tracking-wide text-stone-900 dark:text-stone-100">Favorites</h1>
  </div>
  @if (totalCount() > 0) {
    <span class="text-sm text-stone-400 dark:text-stone-500">{{ totalCount() }} saved</span>
  }
</div>

<div class="flex border-b border-stone-200 dark:border-yellow-900/30 mb-5">
  <button
    type="button"
    (click)="activeTab.set('characters')"
    class="relative flex items-center gap-2 px-4 py-2.5 text-sm font-medium transition-colors cursor-pointer"
    [class]="activeTab() === 'characters'
      ? 'text-yellow-700 dark:text-yellow-400 border-b-2 border-yellow-600 dark:border-yellow-400 -mb-px'
      : 'text-stone-500 dark:text-stone-400 hover:text-stone-700 dark:hover:text-stone-300'"
  >
    <img src="svgs/character.svg" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
    Characters
    @if (characters().length > 0) {
      <span class="inline-flex items-center justify-center w-5 h-5 text-[10px] font-semibold rounded-full bg-yellow-100 dark:bg-yellow-900/40 text-yellow-700 dark:text-yellow-400">
        {{ characters().length }}
      </span>
    }
  </button>

  <button
    type="button"
    (click)="activeTab.set('houses')"
    class="relative flex items-center gap-2 px-4 py-2.5 text-sm font-medium transition-colors cursor-pointer"
    [class]="activeTab() === 'houses'
      ? 'text-yellow-700 dark:text-yellow-400 border-b-2 border-yellow-600 dark:border-yellow-400 -mb-px'
      : 'text-stone-500 dark:text-stone-400 hover:text-stone-700 dark:hover:text-stone-300'"
  >
    <img src="svgs/castle.svg" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
    Houses
    @if (houses().length > 0) {
      <span class="inline-flex items-center justify-center w-5 h-5 text-[10px] font-semibold rounded-full bg-yellow-100 dark:bg-yellow-900/40 text-yellow-700 dark:text-yellow-400">
        {{ houses().length }}
      </span>
    }
  </button>
</div>

@if (isLoading()) {
  <div class="space-y-2">
    @for (i of [1, 2, 3, 4]; track i) {
      <div class="flex items-center gap-4 rounded-xl border border-stone-200 dark:border-yellow-900/30 bg-white dark:bg-black/20 px-5 py-3.5 animate-pulse">
        <div class="w-4 h-4 bg-stone-200 dark:bg-stone-700/50 rounded-full shrink-0"></div>
        <div class="flex-1 h-3.5 bg-stone-200 dark:bg-stone-700/50 rounded w-2/5"></div>
        <div class="w-7 h-7 bg-stone-200 dark:bg-stone-700/50 rounded-full shrink-0"></div>
      </div>
    }
  </div>
}

@if (!isLoading()) {
  @if (activeTab() === 'characters') {
    <app-fav-characters
      [items]="characters()"
      (open)="openCharacter($event)"
      (remove)="removeCharacter($event)"
    />
  } @else if (activeTab() === 'houses') {
    <app-fav-houses
      [items]="houses()"
      (open)="openHouse($event)"
      (remove)="removeHouse($event)"
    />
  }
}

@if (selectedCharacter()) {
  <app-character-info [character]="selectedCharacter()!" (closed)="selectedCharacter.set(null)" />
}

@if (selectedHouse()) {
  <app-house-info [house]="selectedHouse()!" (closed)="selectedHouse.set(null)" />
}
