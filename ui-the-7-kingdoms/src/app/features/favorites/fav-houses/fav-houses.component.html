@if (items.length === 0) {
  <div class="flex flex-col items-center justify-center py-20 text-center">
    <img src="svgs/star.svg" alt="" class="w-10 h-10 opacity-15 dark:invert mb-4" aria-hidden="true" />
    <h3 class="text-base font-semibold text-stone-700 dark:text-stone-300 mb-1">No house favorites yet</h3>
    <p class="text-sm text-stone-400 dark:text-stone-500 mb-4">Star a house to save them here.</p>
    <a
      [routerLink]="'/home/houses'"
      class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium bg-yellow-50 dark:bg-yellow-900/20 text-yellow-700 dark:text-yellow-400 hover:bg-yellow-100 dark:hover:bg-yellow-900/40 border border-yellow-200 dark:border-yellow-800/40 transition-colors"
    >
      <img src="svgs/castle.svg" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
      Browse Houses
    </a>
  </div>
} @else {
  <div class="space-y-2">
    @for (item of items; track item.url) {
      <div
        role="button"
        tabindex="0"
        (click)="open.emit(item.url)"
        (keydown.enter)="open.emit(item.url)"
        class="group flex items-center gap-4 rounded-xl border border-stone-200 dark:border-yellow-950/60 bg-white/50 dark:bg-black/20 px-5 py-3.5 hover:border-yellow-500/50 dark:hover:border-yellow-600/50 hover:bg-yellow-50/50 dark:hover:bg-yellow-900/10 transition-all duration-150 cursor-pointer"
      >
        <!-- <img src="svgs/castle.svg" alt="" class="w-4 h-4 shrink-0 dark:invert opacity-40" aria-hidden="true" /> -->
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium truncate text-stone-900 dark:text-stone-100">
            {{ item.name || 'Unknown House' }}
          </p>
          @if (item.region) {
            <p class="text-xs text-stone-400 dark:text-stone-500 truncate mt-0.5">{{ item.region }}</p>
          }
        </div>
        <button
          type="button"
          (click)="$event.stopPropagation(); remove.emit(item.url)"
          aria-label="Remove from favorites"
          class="shrink-0 flex items-center justify-center w-7 h-7 rounded-full bg-yellow-50 dark:bg-yellow-900/30 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors duration-150 cursor-pointer"
        >
          <img src="svgs/starred.svg" alt="" class="w-3.5 h-3.5 dark:invert" aria-hidden="true" />
        </button>
        <img src="svgs/chevron-right.svg" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
      </div>
    }
  </div>
}
