@if (items.length === 0) {
  <div class="flex flex-col items-center justify-center py-20 text-center">
    <img src="svgs/star.svg" alt="" class="w-10 h-10 opacity-15 dark:invert mb-4" aria-hidden="true" />
    <h3 class="text-base font-semibold text-stone-700 dark:text-stone-300 mb-1">No character favorites yet</h3>
    <p class="text-sm text-stone-400 dark:text-stone-500 mb-4">Star a character to save them here.</p>
    <a
      [routerLink]="'/home/characters'"
      class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium bg-yellow-50 dark:bg-yellow-900/20 text-yellow-700 dark:text-yellow-400 hover:bg-yellow-100 dark:hover:bg-yellow-900/40 border border-yellow-200 dark:border-yellow-800/40 transition-colors"
    >
      <img src="svgs/character.svg" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
      Browse Characters
    </a>
  </div>
} @else {
  <div class="space-y-2">
    @for (item of items; track item.url) {
      <app-generic-card
        [title]="item.name || 'Unknown'"
        [subtitle]="item.culture || undefined"
        (clicked)="open.emit(item.url)"
      >
        <span card-badge
          class="shrink-0 inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium"
          [class]="item.gender === 'Male'
            ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300'
            : item.gender === 'Female'
              ? 'bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-300'
              : 'bg-stone-100 text-stone-500 dark:bg-stone-700/40 dark:text-stone-400'"
        >
          {{ item.gender || 'Unknown' }}
        </span>
        <button card-action
          type="button"
          (click)="$event.stopPropagation(); remove.emit(item.url)"
          aria-label="Remove from favorites"
          class="shrink-0 flex items-center justify-center w-7 h-7 rounded-full bg-yellow-50 dark:bg-yellow-900/30 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors duration-150 cursor-pointer"
        >
          <img src="svgs/starred.svg" alt="" class="w-3.5 h-3.5 dark:invert" aria-hidden="true" />
        </button>
      </app-generic-card>
    }
  </div>
}
