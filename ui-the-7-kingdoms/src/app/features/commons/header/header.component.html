<header
  class="sticky top-0 bg-stone-50/50 dark:bg-transparent border-b border-stone-200 dark:border-yellow-900/40"
>
  <div class="max-w-[1200px] w-full h-[50px] px-3 m-auto flex items-center justify-between">

    <div class="flex md:hidden w-full items-center justify-between">
      <button
        type="button"
        (click)="isMobileMenuOpen.set(true)"
        aria-label="Open menu"
        class="flex items-center justify-center w-9 h-9 rounded-lg text-stone-500 dark:text-stone-400 hover:bg-stone-100 dark:hover:bg-yellow-900/20 transition-colors cursor-pointer"
      >
        <img
          src="svgs/hamburger.svg"
          alt=""
          class="w-5 h-5 dark:invert"
          aria-hidden="true"
        />
      </button>

      <img src="logo-horz.png" alt="The 7 Kingdoms" class="h-10 absolute left-1/2 -translate-x-1/2" />

      <div class="flex items-center gap-0.5">
        <button
          type="button"
          (click)="soundService.toggle()"
          [attr.aria-label]="soundService.isMuted() ? 'Enable ambient sound' : 'Mute ambient sound'"
          class="flex items-center justify-center w-9 h-9 cursor-pointer rounded-lg hover:bg-stone-100 dark:hover:bg-yellow-900/20 transition-colors"
        >
          <img
            [src]="soundService.isMuted() ? 'svgs/sound-off.svg' : 'svgs/sound.svg'"
            alt=""
            class="w-4 h-4 dark:invert"
            aria-hidden="true"
          />
        </button>
        <button
          type="button"
          (click)="themeService.toggle()"
          [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
          class="flex items-center justify-center w-9 h-9 cursor-pointer rounded-lg hover:bg-stone-100 dark:hover:bg-yellow-900/20 transition-colors"
        >
          <img
            [src]="themeService.isDark() ? 'svgs/moon.svg' : 'svgs/sun.svg'"
            alt=""
            class="w-4 h-4 invert"
            aria-hidden="true"
          />
        </button>
      </div>
    </div>

    <img src="logo-horz.png" alt="The 7 Kingdoms" class="hidden md:block h-10" />

    <nav class="hidden md:flex items-center gap-1 text-sm font-medium h-full">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="bg-yellow-50/50 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-300 border-b-2 border-yellow-600 dark:border-yellow-400"
          class="flex items-center gap-1 px-3 h-full border-b-2 border-transparent text-stone-600 dark:text-stone-300 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 transition-colors"
        >
          <img [src]="link.icon" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="hidden md:flex items-center gap-3">
      <button
        type="button"
        (click)="soundService.toggle()"
        [attr.aria-label]="soundService.isMuted() ? 'Enable ambient sound' : 'Mute ambient sound'"
        class="flex items-center justify-center w-8 h-8 cursor-pointer"
      >
        <img
          [src]="soundService.isMuted() ? 'svgs/sound-off.svg' : 'svgs/sound.svg'"
          alt=""
          class="w-4 h-4 dark:invert"
          aria-hidden="true"
        />
      </button>
      <button
        type="button"
        (click)="themeService.toggle()"
        [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        class="flex items-center justify-center w-8 h-8 cursor-pointer"
      >
        <img
          [src]="themeService.isDark() ? 'svgs/moon.svg' : 'svgs/sun.svg'"
          alt=""
          class="w-4 h-4 invert"
          aria-hidden="true"
        />
      </button>

      <div class="relative">
        <button
          type="button"
          (click)="toggleUserMenu($event)"
          aria-label="User menu"
          class="flex items-center justify-center w-8 h-8 rounded-full border border-stone-200 dark:border-yellow-900/40 bg-stone-50 dark:bg-yellow-900/20 hover:border-yellow-500/60 dark:hover:border-yellow-600/60 hover:bg-yellow-50 dark:hover:bg-yellow-900/30 transition-colors cursor-pointer"
        >
          <img src="svgs/user.svg" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
        </button>

        @if (isUserMenuOpen()) {
          <div
            class="absolute right-0 top-full mt-2 w-52 rounded-xl border border-stone-200 dark:border-yellow-900/40 bg-white dark:bg-[#1a1400] shadow-lg shadow-stone-200/60 dark:shadow-black/40 overflow-hidden z-50"
            (click)="$event.stopPropagation()"
          >
            <div class="px-4 py-3">
              <p class="text-xs text-stone-400 dark:text-stone-500 mb-0.5">Signed in as</p>
              <p class="text-sm font-medium text-stone-700 dark:text-stone-200 truncate">{{ user()?.email }}</p>
            </div>

            <div class="border-t border-stone-100 dark:border-yellow-900/20"></div>

            <a
              [routerLink]="'/home/favorites'"
              (click)="isUserMenuOpen.set(false)"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-stone-600 dark:text-stone-300 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 transition-colors cursor-pointer"
            >
              <img src="svgs/star.svg" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
              Favorites
            </a>

            <div class="border-t border-stone-100 dark:border-yellow-900/20"></div>

            <button
              type="button"
              (click)="logout()"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-stone-600 dark:text-stone-300 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors cursor-pointer"
            >
              <img src="svgs/logout.svg" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
              Logout
            </button>
          </div>
        }
      </div>
    </div>

  </div>
</header>

@if (isMobileMenuOpen()) {
  <app-sidebar (closed)="isMobileMenuOpen.set(false)" />
}
