<div
  class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm"
  (click)="close()"
  aria-hidden="true"
></div>

<aside
  class="fixed inset-y-0 left-0 z-50 w-72 flex flex-col bg-white dark:bg-[#1a1400] border-r border-stone-200 dark:border-yellow-900/40 shadow-xl"
  (click)="$event.stopPropagation()"
>
  <div
    class="flex items-center justify-between px-4 h-[50px] border-b border-stone-200 dark:border-yellow-900/40 shrink-0"
  >
    <img src="/logo-horz.png" alt="The 7 Kingdoms" class="h-10" />
    <button
      type="button"
      (click)="close()"
      aria-label="Close menu"
      class="flex items-center justify-center w-8 h-8 rounded-full text-stone-400 hover:text-stone-600 dark:text-stone-500 dark:hover:text-stone-300 hover:bg-stone-100 dark:hover:bg-yellow-900/20 transition-colors cursor-pointer"
    >
      <img src="/svgs/close.svg" alt="" class="w-4 h-4 dark:invert" aria-hidden="true" />
    </button>
  </div>

  <nav class="flex-1 px-3 py-4 overflow-y-auto">
    <div class="space-y-1">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="bg-yellow-50 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-300 border-l-2 border-yellow-600 dark:border-yellow-400"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="close()"
          class="flex items-center gap-3 px-3 py-2.5 rounded-sm text-sm font-medium border-l-2 border-transparent text-stone-600 dark:text-stone-300 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 transition-colors"
        >
          <img [src]="link.icon" alt="" class="w-5 h-5 dark:invert" aria-hidden="true" />
          {{ link.label }}
        </a>
      }
    </div>

    <div class="my-3 border-t border-stone-200 dark:border-yellow-900/30"></div>

    <div class="space-y-1">
      <a
        [routerLink]="'/home/favorites'"
        routerLinkActive="bg-yellow-50 dark:bg-yellow-900/30 text-yellow-800 dark:text-yellow-300 border-l-2 border-yellow-600 dark:border-yellow-400"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="close()"
        class="flex items-center gap-3 px-3 py-2.5 rounded-sm text-sm font-medium border-l-2 border-transparent text-stone-600 dark:text-stone-300 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 transition-colors"
      >
        <img src="/svgs/star.svg" alt="" class="w-5 h-5 dark:invert" aria-hidden="true" />
        Favorites
      </a>
    </div>
  </nav>

  <div class="px-3 py-4 border-t border-stone-200 dark:border-yellow-900/40 shrink-0 space-y-1">
    <button
      type="button"
      (click)="themeService.toggle()"
      [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-stone-600 dark:text-stone-300 hover:text-yellow-700 dark:hover:text-yellow-300 hover:bg-yellow-50 dark:hover:bg-yellow-900/20 transition-colors cursor-pointer"
    >
      <img
        [src]="themeService.isDark() ? '/svgs/moon.svg' : '/svgs/sun.svg'"
        alt=""
        class="w-5 h-5 invert"
        aria-hidden="true"
      />
      {{ themeService.isDark() ? 'Dark mode' : 'Light mode' }}
    </button>

    <button
      type="button"
      (click)="logout()"
      aria-label="Logout"
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-stone-600 dark:text-stone-300 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors cursor-pointer"
    >
      <img src="/svgs/logout.svg" alt="" class="w-5 h-5 dark:invert" aria-hidden="true" />
      Logout
    </button>
  </div>
</aside>
